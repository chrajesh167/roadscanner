# Local development profile — targets the docker-compose Postgres/Redis/Kafka (docker-compose.yml
# at the repo root). Activate with SPRING_PROFILES_ACTIVE=local.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/providerintegrationservice
    username: providerintegrationservice
    password: providerintegrationservice
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
  jpa:
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

roadscanner:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174
  provider:
    flixbus:
      # Placeholder — RoadScanner has no real FlixBus B2B base URL or credentials yet (see
      # README.md "Remaining Integration Points"). The FLIXBUS provider row is seeded
      # enabled=false, so nothing calls this URL until it's replaced with a real one.
      base-url: https://flixbus.example.invalid
      client-id: local-placeholder-client-id
      client-secret: local-placeholder-client-secret

logging:
  level:
    com.roadscanner.providerintegrationservice: DEBUG
    org.hibernate.SQL: DEBUG
