# Test-profile-only settings for properties that legitimately differ per environment and have
# no sensible hardcoded default in application.yml (see config.CorsConfig). Datasource, Redis,
# and Kafka connection details are NOT set here — TestcontainersConfiguration supplies them via
# @ServiceConnection / @DynamicPropertySource.

roadscanner:
  cors:
    allowed-origins: http://localhost:5173
  inventory-service:
    base-url: http://localhost:0 # overridden per-test via MockRestServiceServer or a dynamic property
