# Local development profile — targets the docker-compose Postgres/Redis/Kafka (docker-compose.yml
# at the repo root). Activate with SPRING_PROFILES_ACTIVE=local.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/searchservice
    username: searchservice
    password: searchservice
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
  jpa:
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

roadscanner:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174
  inventory-service:
    base-url: http://localhost:8083

logging:
  level:
    com.roadscanner.searchservice: DEBUG
    org.hibernate.SQL: DEBUG
