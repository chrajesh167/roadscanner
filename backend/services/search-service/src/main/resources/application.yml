# Base configuration shared by every profile. Environment-specific values (datasource, Redis,
# Kafka brokers, CORS origins) are deliberately absent here — they belong in
# application-<profile>.yml so a missing profile activation fails loudly instead of silently
# falling back to a guessed default. See README.md "Configuration Profiles".

spring:
  application:
    name: search-service

  jackson:
    default-property-inclusion: non_null

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate # Flyway is the sole source of schema truth — Hibernate never auto-migrates.
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # Deserializers are configured programmatically per topic in config.KafkaConfig (each topic's
  # JSON target type is bound explicitly in code, not resolved via producer-sent type headers —
  # see that class's Javadoc for why), so only the generic connection/group properties belong
  # here; bootstrap-servers comes from the active profile (application-local.yml/-dev.yml).
  kafka:
    consumer:
      group-id: search-service
      auto-offset-reset: earliest

server:
  port: 8082
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

info:
  app:
    name: search-service
    description: RoadScanner Search Service — trip search, ranking, and filtering over a derived read model

# Operational tuning knobs (docs/services/search-service/boundaries.md, use-cases.md). Values
# here are the platform baseline, overridable per environment.
roadscanner:
  search:
    pagination:
      default-page-size: 20
      max-page-size: 50
    suggestions:
      max-results: 10
    availability:
      cache-ttl: PT15S # short-lived by design — docs/services/search-service/boundaries.md
      request-timeout: PT0.5S
    kafka:
      trip-events-topic: trip-events
      review-events-topic: review-events
