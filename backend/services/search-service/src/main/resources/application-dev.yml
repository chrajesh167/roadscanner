# Deployed dev environment profile. Every environment-specific value comes from an env var with
# no hardcoded fallback for secrets — a missing env var should fail startup loudly, not silently
# default to something insecure. Populated by infrastructure/kubernetes/overlays/dev at deploy
# time (see docs/architecture/high-level-design.md §10).

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

management:
  endpoint:
    health:
      show-details: never

roadscanner:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  inventory-service:
    base-url: ${INVENTORY_SERVICE_BASE_URL}

logging:
  level:
    com.roadscanner.searchservice: INFO
