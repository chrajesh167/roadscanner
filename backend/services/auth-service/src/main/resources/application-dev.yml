# Deployed dev environment profile. Every environment-specific value comes from an env var with
# no hardcoded fallback for secrets — a missing env var should fail startup loudly, not silently
# default to something insecure. Populated by infrastructure/kubernetes/overlays/dev at deploy
# time (see docs/architecture/high-level-design.md §10).

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

management:
  endpoint:
    health:
      show-details: never

roadscanner:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  security:
    jwt:
      # PEM-encoded RS256 pair (PKCS#8 private / X.509 public), sourced from the secrets
      # manager at deploy time — never a hardcoded fallback, per security-design.md.
      private-key-pem: ${JWT_PRIVATE_KEY_PEM}
      public-key-pem: ${JWT_PUBLIC_KEY_PEM}

logging:
  level:
    com.roadscanner.authservice: INFO
