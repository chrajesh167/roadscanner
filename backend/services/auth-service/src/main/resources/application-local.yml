# Local development profile — targets the docker-compose Postgres/Redis (docker-compose.yml at
# the repo root). Activate with SPRING_PROFILES_ACTIVE=local (already set for the auth-service
# container in docker-compose.yml; set it yourself when running the jar directly).

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/authservice
    username: authservice
    password: authservice
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

roadscanner:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174

logging:
  level:
    com.roadscanner.authservice: DEBUG
    org.hibernate.SQL: DEBUG
