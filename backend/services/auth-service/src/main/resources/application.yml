# Base configuration shared by every profile. Environment-specific values (datasource, Redis,
# CORS origins) are deliberately absent here — they belong in application-<profile>.yml so a
# missing profile activation fails loudly instead of silently falling back to a guessed default.
# See README.md "Configuration Profiles".

spring:
  application:
    name: auth-service

  jackson:
    default-property-inclusion: non_null

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate # Flyway is the sole source of schema truth — Hibernate never auto-migrates.
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8081
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Operational security tuning knobs (docs/services/auth-service/security-design.md). Values here
# are the platform baseline, overridable per environment. JWT signing keys are deliberately NOT
# here — they come from the secrets manager via env vars (dev/prod) or an explicit ephemeral
# opt-in (local/test); see config/JwtConfig.
roadscanner:
  auth:
    lockout-threshold: 5
    lockout-duration: PT15M
    password-min-length: 12
    bcrypt-strength: 12
    reset-token-ttl: PT30M
  security:
    jwt:
      issuer: roadscanner-auth-service
      access-token-ttl: PT15M # short-lived by design — docs/architecture/authentication-flow.md
      refresh-token-ttl: P14D

info:
  app:
    name: auth-service
    description: RoadScanner Auth Service — authentication and authorization only
