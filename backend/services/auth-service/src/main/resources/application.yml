# Base configuration shared by every profile. Environment-specific values (datasource, Redis,
# CORS origins) are deliberately absent here — they belong in application-<profile>.yml so a
# missing profile activation fails loudly instead of silently falling back to a guessed default.
# See README.md "Configuration Profiles".

spring:
  application:
    name: auth-service

  jackson:
    default-property-inclusion: non_null

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate # Flyway is the sole source of schema truth — Hibernate never auto-migrates.
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8081
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

info:
  app:
    name: auth-service
    description: RoadScanner Auth Service — authentication and authorization only
