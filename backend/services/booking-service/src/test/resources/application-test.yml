# Test-profile-only settings for properties that legitimately differ per environment and have no
# sensible hardcoded default in application.yml. Datasource and Kafka connection details are NOT
# set here — TestcontainersConfiguration supplies them via @ServiceConnection.

roadscanner:
  cors:
    allowed-origins: http://localhost:5173
  security:
    jwt:
      # Tests sign and verify within one process; a throwaway pair per test run is exactly
      # right — testsupport.security.TestJwtIssuer mints tokens against this same key pair.
      ephemeral-keys: true
  booking:
    inventory-service:
      base-url: http://localhost:0 # overridden per-test via MockRestServiceServer or WireMock
    provider-integration-service:
      base-url: http://localhost:0 # overridden per-test via MockRestServiceServer or WireMock
