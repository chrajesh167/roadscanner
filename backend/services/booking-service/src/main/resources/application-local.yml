# Local development profile — targets the docker-compose Postgres/Kafka (docker-compose.yml at
# the repo root) and natively-running inventory-service/provider-integration-service. Activate
# with SPRING_PROFILES_ACTIVE=local.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5436/bookingservice
    username: bookingservice
    password: bookingservice
  kafka:
    bootstrap-servers: localhost:9092
  jpa:
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

roadscanner:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174
  security:
    jwt:
      # Local development only: throwaway verification key generated at startup. Only valid
      # against tokens signed by this same process's test-token issuer — NOT interoperable with
      # a separately-running auth-service instance without sharing the same key pair out of band
      # (see README.md "Remaining Integration Points"). Never set this in a deployed environment.
      ephemeral-keys: true
  booking:
    inventory-service:
      base-url: http://localhost:8084
    provider-integration-service:
      base-url: http://localhost:8083

logging:
  level:
    com.roadscanner.bookingservice: DEBUG
    org.hibernate.SQL: DEBUG
