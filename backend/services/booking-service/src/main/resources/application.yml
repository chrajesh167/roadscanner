# Base configuration shared by every profile. Environment-specific values (datasource, Kafka
# brokers, CORS origins, JWT public key, inventory-service/provider-integration-service base
# URLs) are deliberately absent here — they belong in application-<profile>.yml so a missing
# profile activation fails loudly instead of silently falling back to a guessed default. See
# README.md "Configuration Profiles".

spring:
  application:
    name: booking-service

  jackson:
    default-property-inclusion: non_null

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate # Flyway is the sole source of schema truth — Hibernate never auto-migrates.
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # Deserializers are configured programmatically per topic in config.KafkaConfig (each topic's
  # JSON target type is bound explicitly in code, not resolved via producer-sent type headers),
  # so only the generic connection/group properties belong here.
  kafka:
    consumer:
      group-id: booking-service
      auto-offset-reset: earliest

server:
  port: 8085
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

info:
  app:
    name: booking-service
    description: RoadScanner Booking Service — the platform's booking orchestration layer

# Operational tuning knobs (docs/services/booking-service/). Values here are the platform
# baseline, overridable per environment.
roadscanner:
  security:
    jwt:
      # Must match auth-service's own issuer claim exactly (docs/services/auth-service/security-design.md).
      issuer: roadscanner-auth-service
  booking:
    kafka:
      catalog-trip-events-topic: catalog-trip-events
      provider-integration-events-topic: provider-integration-events
      payment-events-topic: payment-events
      booking-events-topic: booking-events
    scheduling:
      complete-booking-cron: "0 */5 * * * *"
      sweep-stale-holds-cron: "0 */2 * * * *"
    inventory-service:
      connect-timeout: PT2S
      read-timeout: PT5S
    provider-integration-service:
      connect-timeout: PT2S
      read-timeout: PT10S
