# Local development dependencies. Scoped to what auth-service needs today (Postgres, Redis) —
# not Kafka/nginx/observability, which no implemented service depends on yet. Grows as more
# services are implemented; see docker/ for where each component's config lives.
#
# auth-service itself is intentionally NOT a service here: application-local.yml assumes
# "localhost" for Postgres/Redis, i.e. the app runs natively (./mvnw spring-boot:run) against
# these containers — the standard fast-iteration workflow. To run auth-service itself in a
# container, build and run backend/services/auth-service/Dockerfile directly; see that
# service's README for both options.

services:
  postgres:
    image: postgres:16-alpine
    container_name: roadscanner-postgres
    environment:
      POSTGRES_DB: authservice
      POSTGRES_USER: authservice
      POSTGRES_PASSWORD: authservice
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authservice -d authservice"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: roadscanner-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
